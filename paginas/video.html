<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="aba_video"></title>
    <link rel="stylesheet" href="/css/estiloGeral.css">
    <link rel="stylesheet" href="/css/estiloVideos.css">
    <link rel="shortcut icon" href="/imagens/yt_favicon.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="wrapper_main">
            <main>
                <section class="div_video">
                    <video controls id="player_video" poster="" class="video">
                        <source id="scr_video" src="" type="video/mp4">
                    </video>
                </section>
                <article class="descricao">
                    <article class="postagem">
                        <h2 id="titulo_video"></h2>
                        <div class="autor_video_html">
                            <img id="canal_video" src="" alt="img_canal">
                            <div class="info">
                                <span id="autor_video"></span>
                                <small id="data_video"></small>
                            </div>
                        </div>
                        <h3>Descrição:</h3>
                        <p id="descricao_video"></p>
                    </article>
                    <section class="comentario">
                    </section>
                </article>
            </main>
        </div>
    
        <aside class="side_bar">
                <!-- js vai preencher -->
        </aside>
    </div>
    <script src="/js/video.js"></script>
    <script src="/js/header.js"></script>
</body>
</html>
