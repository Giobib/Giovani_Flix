<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conta</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'rel='stylesheet'> 
    <link rel="stylesheet" href="/css/estiloGeral.css">
    <link rel="stylesheet" href="/css/estiloRegistro.css">
    <link rel="shortcut icon" href="/imagens/yt_favicon.png" type="image/x-icon">
</head>
<body>
    <main class="container_geral">
        <form class="container_body">
            <div class="container">
                <h1>Login Giovani Flix</h1>

                <div class="input_box">
                    <input type="email" placeholder="Usuário">
                    <i class="bx bxs-user"></i>
                </div>

                <div class="input_box">
                    <input type="password" placeholder="senha">
                    <i class="bx bxs-lock-alt"></i>
                </div>

                <div class="lembrar_senha">
                    <label for="">
                        <input type="checkbox">
                        Lembrar senha
                    </label>
                </div>

                <button type="submit" class="botao_login">Login</button>

                <div class="link_registrar">
                    <p>Não tem uma conta? <a href="cadastrar.html">Cadastre-se</a></p>
                </div>
            </div>
        </form>
    </main>
    <script src="/js/header.js"></script>
</body>
</html>
